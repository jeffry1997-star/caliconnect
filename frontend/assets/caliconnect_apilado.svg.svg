<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- Fondo transparente -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- Isotipo: Torre estilizada -->
  <g id="isotipo" transform="translate(0,60)">
    <!-- Torre base -->
    <rect x="500" y="220" width="80" height="360" rx="8" fill="#000000"/>
    <!-- Ventanas/ranuras -->
    <rect x="518" y="260" width="44" height="8" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <rect x="518" y="290" width="44" height="8" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <rect x="518" y="320" width="44" height="8" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <rect x="518" y="350" width="44" height="8" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <rect x="518" y="380" width="44" height="8" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <!-- Torre superior (tapered) -->
    <path d="M540 180 L520 220 L560 220 Z" fill="#000000"/>
    <!-- Antena -->
    <rect x="538" y="140" width="4" height="40" rx="2" fill="#000000"/>
    <circle cx="540" cy="134" r="6" fill="#000000"/>

    <!-- Ondas Wi-Fi sobre la antena -->
    <path d="M540 120 C560 120 580 110 600 100" fill="none" stroke="#0B3D91" stroke-width="6" stroke-linecap="round"/>
    <path d="M540 110 C565 110 590 95 615 85" fill="none" stroke="#0B3D91" stroke-width="4" stroke-linecap="round"/>

    <!-- Anillos orbitando la torre -->
    <path d="M300 420 C420 200 660 200 780 420" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <path d="M320 480 C440 260 640 260 760 480" fill="none" stroke="#0B3D91" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="1"/>

    <!-- Nodos conectados a los anillos -->
    <circle cx="300" cy="420" r="18" fill="#000000"/>
    <circle cx="760" cy="480" r="18" fill="#0B3D91"/>
  </g>

  <!-- Texto del logotipo (apilado debajo del isotipo) -->
  <g id="logotipo" transform="translate(0,560)">
    <text x="540" y="220" text-anchor="middle" font-family="Poppins, Arial, Helvetica, sans-serif" font-weight="600" font-size="120">
      <tspan fill="#000000">Cali</tspan>
      <tspan fill="#0B3D91">Connect</tspan>
    </text>
  </g>
</svg>
