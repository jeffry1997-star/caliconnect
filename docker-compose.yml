version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: caliconnect_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: caliconnect
      MYSQL_USER: caliconnect
      MYSQL_PASSWORD: caliconnect_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - caliconnect_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Flask API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: caliconnect_backend
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=caliconnect
      - FLASK_ENV=development
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - caliconnect_network
    restart: unless-stopped

  # Frontend Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: caliconnect_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - caliconnect_network
    restart: unless-stopped

# Networks
networks:
  caliconnect_network:
    driver: bridge

# Volumes
volumes:
  mysql_data:
    driver: local
