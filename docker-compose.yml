
services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: caliconnect_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: caliconnect
      MYSQL_USER: caliconnect
      MYSQL_PASSWORD: caliconnect_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/agregar_productos.sql:/docker-entrypoint-initdb.d/agregar_productos.sql
    ports:
      - "3307:3306"
    networks:
      - caliconnect_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    

  # Backend Flask API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: alejo97/caliconnect-backend:latest 
    container_name: caliconnect_backend
    environment:
      - DB_HOST=mysql
      - DB_USER=caliconnect
      - DB_PASSWORD=caliconnect_pass
      - DB_NAME=caliconnect
      - FLASK_ENV=development
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - caliconnect_network
    restart: always
    

  # Frontend Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: alejo97/caliconnect-frontend:latest  
    container_name: caliconnect_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - caliconnect_network
    restart: always

# Networks
networks:
  caliconnect_network:
    driver: bridge

# Volumes
volumes:
  mysql_data:
    driver: local
